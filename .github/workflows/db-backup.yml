name: Database backup

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  backup-production-db:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare backup file name
        id: meta
        shell: bash
        run: |
          ts="$(date -u +%Y%m%d-%H%M%S)"
          echo "file_name=neon-prod-${ts}.dump" >> "$GITHUB_OUTPUT"

      - name: Resolve backup database URL
        id: db_url
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        shell: bash
        run: |
          set -euo pipefail

          db_url="${PROD_DATABASE_URL:-}"
          db_source="PROD_DATABASE_URL"

          if [[ -z "${db_url}" ]]; then
            db_url="${DATABASE_URL:-}"
            db_source="DATABASE_URL"
          fi

          if [[ -z "${db_url}" ]]; then
            echo "::error::Missing database secret. Configure PROD_DATABASE_URL (recommended) or DATABASE_URL in repository secrets."
            echo "### Database backup setup error" >> "$GITHUB_STEP_SUMMARY"
            echo "- Required secret not found." >> "$GITHUB_STEP_SUMMARY"
            echo "- Add \`PROD_DATABASE_URL\` (recommended) or \`DATABASE_URL\` in GitHub repo secrets." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "::add-mask::${db_url}"
          echo "database_url=${db_url}" >> "$GITHUB_OUTPUT"
          echo "using_secret=${db_source}" >> "$GITHUB_OUTPUT"
          echo "Using database URL from secret: ${db_source}"

      - name: Dump production database
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p backups
          docker run --rm \
            -e DATABASE_URL="${{ steps.db_url.outputs.database_url }}" \
            -v "${GITHUB_WORKSPACE}/backups:/backups" \
            postgres:17-alpine \
            sh -lc "pg_dump \"\$DATABASE_URL\" -Fc -f \"/backups/${{ steps.meta.outputs.file_name }}\""

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.meta.outputs.file_name }}
          path: backups/${{ steps.meta.outputs.file_name }}
          if-no-files-found: error
          retention-days: 30

      - name: Prune old backup artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 14;
            const { owner, repo } = context.repo;
            const allArtifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const backups = allArtifacts
              .filter((a) => a.name.startsWith('db-backup-neon-prod-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            for (const artifact of backups.slice(keep)) {
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
